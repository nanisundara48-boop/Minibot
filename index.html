<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueChats AI</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin:0; display:flex; height:100vh; font-family:sans-serif; }
        .sidebar { width:280px; background:#f4f4f4; padding:20px; display:flex; flex-direction:column; }
        .chat-area { flex:1; display:flex; flex-direction:column; }
        #messages { flex:1; overflow-y:auto; padding:20px; }
        .input-box { padding:20px; display:flex; gap:10px; }
        input, textarea { padding:10px; border-radius:5px; border:1px solid #ccc; flex:1; }
        button { padding:10px 20px; background:#007bff; color:#fff; border:none; cursor:pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>TrueChats AI</h3>
        <input type="text" id="search" placeholder="Search history..." oninput="filter()">
        <button onclick="newChat()">+ New Chat</button>
        <div id="history"></div>
    </div>
    <div class="chat-area">
        <div id="messages"></div>
        <div class="input-box">
            <textarea id="msg" placeholder="Type here..."></textarea>
            <button onclick="send()">Send</button>
        </div>
    </div>

    <script>
        const db = firebase.initializeApp({/* config */}).firestore();
        
        // Chat Logic
        async function send() {
            const msg = document.getElementById('msg').value;
            if(!msg) return;
            
            // Add to UI
            document.getElementById('messages').innerHTML += `<div><b>You:</b> ${msg}</div>`;
            document.getElementById('msg').value = '';
            
            // Firebase & AI Logic
            await db.collection('chats').add({ prompt: msg, timestamp: new Date() });
            // API call here
        }

        function filter() {
            const val = document.getElementById('search').value.toLowerCase();
            // Filtering logic
        }

        function newChat() {
            document.getElementById('messages').innerHTML = '';
        }
    </script>
</body>
</html>
